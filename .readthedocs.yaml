# Dormant until the repo is published and imported into Read the Docs.
version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.13"
  commands:
    - pip install uv
    - uv sync --locked --no-install-project --only-group docs
    - uv run --no-sync mkdocs build --strict -d "$READTHEDOCS_OUTPUT/html"
