site_name: pylongfellow
site_description: Thin Python binding to Google's Longfellow zero-knowledge mdoc library
repo_url: https://github.com/pipe23-org/pylongfellow

theme:
  name: material
  font: false
  features:
    - navigation.sections
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: false
            show_root_heading: true
            show_labels: false
            heading_level: 3
            members_order: source
            separate_signature: true
            show_signature_annotations: true

nav:
  - Home: index.md
  - API Reference: reference.md
