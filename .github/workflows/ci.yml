name: CI

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.14"
      - run: uv sync --locked --no-install-project
      - run: uv run --no-sync ruff check
      - run: uv run --no-sync ruff format --check

  types:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - run: sudo apt-get update && sudo apt-get install -y libssl-dev libzstd-dev libgtest-dev libbenchmark-dev
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.14"
      - run: uv sync --locked
      - run: uv run --no-sync mypy

  test-fast:
    if: ${{ github.event_name == 'push' && github.ref != 'refs/heads/main' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - run: sudo apt-get update && sudo apt-get install -y libssl-dev libzstd-dev libgtest-dev libbenchmark-dev
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.14"
      - run: uv sync --locked
      - run: uv run --no-sync pytest

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.14"
      # No submodule / native build: mkdocstrings reads the source statically.
      - run: uv sync --locked --no-install-project
      - run: uv run --no-sync interrogate -v src/pylongfellow
      - run: uv run --no-sync mkdocs build --strict

  test:
    if: ${{ github.event_name == 'pull_request' || github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - run: sudo apt-get update && sudo apt-get install -y libssl-dev libzstd-dev libgtest-dev libbenchmark-dev
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --locked
      - run: uv run --no-sync pytest -m "slow or not slow" --cov
